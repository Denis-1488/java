<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 4</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tabs-container">

        <div class="tabs">

            <button class="tab-btn active" data-tab="html">
                HTML
            </button>

            <button class="tab-btn" data-tab="css">
                CSS
            </button>

            <button class="tab-btn" data-tab="js">
                JS
            </button>

        </div>

        <div class="content">

            <div class="tab-content active" id="html">
                <h2>HTML</h2>

                <p>
                    HyperText Markup Language (HTML) is the standard
                    markup language for creating web pages.
                </p>
            </div>

            <div class="tab-content" id="css">
                <h2>CSS</h2>

                <p>
                    CSS is used for styling HTML elements and making
                    websites beautiful and responsive.
                </p>
            </div>

            <div class="tab-content" id="js">
                <h2>JavaScript</h2>

                <p>
                    JavaScript adds interactivity to websites and
                    allows creating dynamic web applications.
                </p>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
